name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump (major, minor, patch, or explicit like 1.2.3)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    environment: Lint Suite
    permissions:
      contents: write
      id-token: write

    steps:
      # SHA = actions/checkout@v4
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      # SHA = pnpm/action-setup@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 10.33.0

      # SHA = actions/setup-node@v4
      # Built-in npm auth via NODE_AUTH_TOKEN — no manual .npmrc needed.
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: pnpm run release:ci -- "$RELEASE_VERSION"
