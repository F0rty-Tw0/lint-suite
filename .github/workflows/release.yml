name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump (major, minor, patch, or explicit like 1.2.3)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    environment: Lint Suite
    permissions:
      contents: write
      id-token: write

    steps:
      # SHA = actions/checkout@v7.0.0
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      # SHA = pnpm/action-setup@v6.0.9
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          version: 11.13.1

      # SHA = actions/setup-node@v7.0.0
      # Built-in npm auth via NODE_AUTH_TOKEN — no manual .npmrc needed.
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: pnpm run release:ci -- "$RELEASE_VERSION"
